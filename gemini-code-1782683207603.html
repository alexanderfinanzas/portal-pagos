<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Marcilla Academy · Portal de Pagos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="app-container">
    
    <header class="app-header">
      <div class="brand">
        <h1>MARCILLA ACADEMY</h1>
        <span>Portal de Pagos</span>
      </div>
      <div class="tasa-info" id="tasa-container">
        </div>
    </header>

    <nav class="app-nav" id="main-nav">
      </nav>

    <main class="app-content" id="app-content">
      <div id="loading-state" class="state-view active">
        <div class="spinner"></div>
        <p>Cargando plataforma...</p>
      </div>
      <div id="error-state" class="state-view">
        <p id="error-message">Ha ocurrido un error.</p>
        <button onclick="App.init()" class="btn-primary">Reintentar</button>
      </div>
      <div id="view-container">
        </div>
    </main>
  </div>

  <div id="toast-container"></div>

  <script src="utils.js"></script>
  <script src="api.js"></script>
  <script src="builders.js"></script>
  <script src="app.js"></script>
</body>
</html>
